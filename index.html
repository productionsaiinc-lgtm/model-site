<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nova Studio | Exclusive Content</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div id="age-gate">
  <div class="age-gate-content">
    <h2>18+ ADULT CONTENT</h2>
    <p>This website contains sexually explicit material. You must be at least 18 years of age to enter.</p>
    <div class="age-gate-buttons">
      <button class="btn-yes">I AM 18+</button>
      <button class="btn-no">EXIT</button>
    </div>
  </div>
</div>

<header class="hero">
<nav><h1>Nova Studio</h1></nav>
</header>

<section id="account">
<h2>Member Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button id="login-btn">Login</button>
<button id="signup-btn">Create Account</button>
</section>

<section id="pricing" class="pricing">
<h2>Access Plans</h2>
<div class="cards">
<div class="card"><h3>Basic Access</h3><button>Current Plan</button></div>
<div class="card highlight"><h3>Pro Membership</h3><button>Upgrade Now</button></div>
<div class="card"><h3>Elite Pass</h3><button>Go Elite</button></div>
</div>
</section>

<footer>© 2026 Nova Studio</footer>

<script src="auth-client.js"></script>
<script src="script.js"></script>
<script>
loginBtn.addEventListener("click", async () => {
  const result = await NovaAuth.login(email.value, password.value);

  console.log(result);

  if (result.success) {
    localStorage.setItem(
      "session",
      JSON.stringify(result.session)
    );

    localStorage.setItem(
      "user",
      JSON.stringify(result.user)
    );

    alert("Login successful");
    window.location.reload();
  } else {
    alert(result.error || "Login failed");
  }
});
</script>
</body>
</html>
